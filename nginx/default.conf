server {
    listen 80;
    server_name localhost;

    # Раздача статики (Nginx отдаст её сам, минуя Python)
    location /static/ {
        alias /app/staticfiles/;
    }

    # Раздача картинок товаров и аватарок
    location /media/ {
        alias /app/media/;
    }

    # Все остальные запросы перенаправляем в Gunicorn (Django)
    location / {
        proxy_pass http://web:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
}