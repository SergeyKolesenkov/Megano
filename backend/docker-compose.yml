version: '3.8'

services:
  # 1. Контейнер базы данных
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=megano_db
      - POSTGRES_USER=megano_user
      - POSTGRES_PASSWORD=megano_secure_password
    ports:
      - "5432:5432"

  # 2. Контейнер вашего Django + Vue приложения
  web:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn backend.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DEBUG=False
      - SECRET_KEY=your_production_secret_key_here
      - DB_NAME=megano_db
      - DB_USER=megano_user
      - DB_PASSWORD=megano_secure_password
      - DB_HOST=db
    depends_on:
      - db

  # 3. Веб-сервер Nginx для раздачи статики и медиа
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume: